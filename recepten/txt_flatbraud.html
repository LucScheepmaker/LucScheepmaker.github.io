<h1>Flatbraud</h1>
<table>
<tr><th>Ingredient</th><th>Bereiding</th></tr>
<tr><td class="clsLeft">100 gr roggemeel<br />50 gr bakmeel<br />1 gr zout<br />Evt. kruiden<br />80 gr water</td><td>Mengen tot stevig deeg. Even laten rusten. In vieren delen en uitrollen tot dunne tortilla’s. Inprikken met vork en in koekenpan roosteren 1 min per kant.<br />Kort in warm water dompelen.</td></tr>
