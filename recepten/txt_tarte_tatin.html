<h1>Tarte Tatin</h1>
<table>
<tr><th>Ingredient</th><th>Bereiding</th></tr>
<tr><td class="clsLeft">50 gr bloem<br />35 gr boter<br />25 gr suiker<br />mp zout<br />1 el water</td><td>Deeg van maken<br />Opstijven in koelkast<br />Daarna deeg uitrollen tot plak</td></tr>
<tr><td class="clsLeft">2 appels</td><td>In dunne plakjes over het deeg</td></tr>
<tr><td class="clsLeft">gesmolten boter</td><td>Over appel smeren</td></tr>
<tr><td class="clsLeft">kristalsuiker en kaneelpoeder</td><td>Over taartje strooien<br /><br />20 min op 200 °C</td></tr>
</table>

</body>
